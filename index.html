<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyTrack | Student Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <script defer src="js/student-data.js"></script>
  <script defer src="js/auth.js"></script>
</head>
<body>
  <main class="auth-page">
    <section class="auth-hero">
      <div class="brand"><img src="assets/images/logo.svg" alt="StudyTrack logo"><span>StudyTrack</span></div>
      <h1>Study planner and attendance tracker for students.</h1>
      <p>Plan subjects, track attendance, complete tasks, and view progress reports from one clean dashboard.</p>
      <img class="hero-img" src="assets/images/dashboard-illustration.svg" alt="Dashboard illustration">
    </section>

    <section class="login-card">
      <h2>Student Login</h2>
      <p>Select a demo student and enter the dashboard.</p>
      <form id="studentLoginForm">
        <label>Student</label>
        <select id="studentSelect" required></select>
        <button class="btn" type="submit">Enter Student Dashboard</button>
      </form>
      <a class="link-btn" href="admin/admin-login.html">Teacher/Admin Login</a>
    </section>
  </main>
</body>
</html>
